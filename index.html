<!DOCTYPE html>
<html>

<head>
  <title>Supply Request</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      margin: 40px;
    }

    .container {
      max-width: 320px;
      margin: auto;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
    }

    select,
    input,
    button {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      font-size: 13px;
      border: 1px solid #000;
      border-radius: 0;
      background-color: #fff;
      color: #000;
    }

    button {
      margin-top: 10px;
      cursor: pointer;
    }

    #otherItem {
      display: none;
    }

    #successMessage {
      display: none;
      margin-top: 10px;
      padding: 6px;
      background-color: #e0e0e0;
      color: #000;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Report Supplies</h1>

    <form 
      id="form"
      action="https://docs.google.com/forms/d/e/1FAIpQLSc9Ou3HIOlln2gQSxu2yRY2KmMrPynYYKKv4CU7WjEpqfUBzg/formResponse"
      method="POST"
      target="hidden_iframe"
      onsubmit="return handleSubmit()"
    >

      <!-- Item -->
      <label>Item</label>
      <select name="entry.1406252316" id="itemSelect" onchange="checkOther()">
        <option value="Soap">Soap</option>
        <option value="Toilet Paper">Toilet Paper</option>
        <option value="Paper Towel">Paper Towel</option>
        <option value="Pads">Pads</option>
        <option value="Tampons">Tampons</option>
        <option value="Other">Other</option>
      </select>

      <!-- Other input -->
      <input type="text" id="otherItem" placeholder="Type item here">

      <!-- Bathroom -->
      <label>Bathroom Type</label>
      <select name="entry.632713553">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Gender Neutral">Gender Neutral</option>
      </select>

      <!-- Location -->
      <label>Location</label>
      <input type="text" name="entry.1849314937" placeholder="e.g. Floor 1">

      <!-- Status -->
      <label>Status</label>
      <select name="entry.491903196">
        <option value="Out">Out</option>
        <option value="Low">Low</option>
      </select>

      <button type="submit">Submit</button>

    </form>

    <div id="successMessage">
      Request submitted successfully
    </div>

    <iframe name="hidden_iframe" style="display:none;"></iframe>

  </div>

  <script>
    function checkOther() {
      var select = document.getElementById("itemSelect");
      var otherBox = document.getElementById("otherItem");
      otherBox.style.display = (select.value === "Other") ? "block" : "none";
    }

    function handleSubmit() {
      var select = document.getElementById("itemSelect");
      var otherBox = document.getElementById("otherItem");

      if (select.value === "Other") {
        if (otherBox.value.trim() === "") {
          alert("Please type the item name.");
          return false;
        }
        select.value = otherBox.value;
      }

      document.getElementById("successMessage").style.display = "block";

      setTimeout(function() {
        document.getElementById("form").reset();
        document.getElementById("otherItem").style.display = "none";
      }, 800);

      return true;
    }
  </script>

</body>

</html>
